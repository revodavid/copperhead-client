<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopperHead Agent</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script type="module" src="https://unpkg.com/deep-chat@2.4.2/dist/deepChat.bundle.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 1.5rem 1rem 1rem;
        }

        header h1 {
            font-size: 1.8rem;
            color: #e8a838;
        }

        header p {
            color: #aaa;
            font-size: 0.95rem;
            margin-top: 0.3rem;
        }

        #chat-container {
            flex: 1;
            width: 100%;
            max-width: 720px;
            padding: 0 1rem 1rem;
            display: flex;
            flex-direction: column;
        }

        /* Error / no-key message */
        #no-key {
            max-width: 500px;
            margin: 3rem auto;
            padding: 2rem;
            background: #16213e;
            border: 1px solid #e8a83855;
            border-radius: 12px;
            text-align: center;
        }

        #no-key h2 { color: #e8a838; margin-bottom: 1rem; }
        #no-key p { line-height: 1.6; }
        #no-key code {
            background: #0f3460;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>🐍 CopperHead Agent</h1>
    <p>Describe a strategy and I'll build a bot for you</p>
</header>

<!-- Shown when no API key is provided -->
<div id="no-key" style="display: none;">
    <h2>API Key Required</h2>
    <p>
        To use the CopperHead Agent, add your Foundry API key to the URL:<br><br>
        <code>agent.html?key=YOUR_API_KEY</code><br><br>
        You can find your API key in the
        <a href="https://portal.azure.com" style="color: #e8a838;">Azure Portal</a>
        under your AI Services resource → Keys and Endpoint.
    </p>
</div>

<!-- Chat UI — shown when key is present -->
<div id="chat-container" style="display: none;">
    <deep-chat
        id="chat"
        style="
            flex: 1;
            width: 100%;
            border-radius: 10px;
            border: 1px solid #333;
            background: #16213e;
            font-size: 0.95rem;
        "
    ></deep-chat>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const apiKey = params.get("key");

    if (!apiKey) {
        // No key — show instructions
        document.getElementById("no-key").style.display = "block";
    } else {
        // Key present — set up the chat
        document.getElementById("chat-container").style.display = "flex";

        const chat = document.getElementById("chat");

        // Conversation history for multi-turn support.
        // We send the full history with each request so the agent
        // remembers earlier messages in the session.
        const conversationHistory = [];

        chat.connect = {
            handler: async (body, signals) => {
                // Get the latest user message from deep-chat
                const lastMsg = body.messages[body.messages.length - 1];
                const userText = lastMsg.text || "";

                conversationHistory.push({ role: "user", content: userText });

                try {
                    const response = await fetch("/agent/chat", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "api-key": apiKey,
                        },
                        body: JSON.stringify({ messages: conversationHistory }),
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        signals.onResponse({
                            error: "Error " + response.status + ": " + errText,
                        });
                        // Remove the failed user message from history
                        conversationHistory.pop();
                        return;
                    }

                    const data = await response.json();
                    conversationHistory.push({
                        role: "assistant",
                        content: data.text,
                    });
                    signals.onResponse({ text: data.text });
                } catch (err) {
                    signals.onResponse({
                        error: "Failed to connect to the agent. Is the server running?",
                    });
                    conversationHistory.pop();
                }
            },
        };

        // Intro message shown when the chat loads
        chat.introMessage = {
            text: "Hi! I'm the CopperHead Agent 🐍\n\nDescribe a snake strategy and I'll generate a bot and launch it into the game for you.\n\nFor example: *\"Make a bot that aggressively chases food and cuts off the opponent.\"*",
        };

        // Placeholder text in the input field
        chat.textInput = {
            placeholder: { text: "Describe your snake strategy..." },
        };

        // Style the message bubbles
        chat.messageStyles = {
            default: {
                shared: {
                    bubble: {
                        borderRadius: "8px",
                        padding: "10px 14px",
                        maxWidth: "85%",
                        fontSize: "0.95rem",
                        lineHeight: "1.5",
                    },
                },
                user: {
                    bubble: {
                        backgroundColor: "#0f3460",
                        color: "#e0e0e0",
                    },
                },
                ai: {
                    bubble: {
                        backgroundColor: "#1a1a2e",
                        color: "#e0e0e0",
                        border: "1px solid #333",
                    },
                },
            },
        };

        // Style the submit button
        chat.submitButtonStyles = {
            submit: {
                container: {
                    default: { backgroundColor: "#e8a838", borderRadius: "6px" },
                },
                svg: {
                    styles: { default: { filter: "brightness(0)" } },
                },
            },
        };
    }
</script>

</body>
</html>
